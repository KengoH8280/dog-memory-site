<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Dog Memory</title>
    <meta name="description" content="Dog Memory is a simple iOS memory game with pixel dogs.">
    <style>
      :root {
        color-scheme: light;
        --ink: #182033;
        --muted: #667085;
        --sky: #5ed8ff;
        --sun: #ffd91f;
        --rose: #f23b67;
        --bg: #f8fbff;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at 20% 20%, rgba(94, 216, 255, 0.28), transparent 28rem),
          radial-gradient(circle at 80% 10%, rgba(255, 217, 31, 0.22), transparent 22rem),
          var(--bg);
        color: var(--ink);
      }
      main {
        width: min(960px, calc(100% - 32px));
        margin: 0 auto;
        padding: 64px 0 48px;
      }
      .hero {
        display: grid;
        gap: 28px;
        align-items: center;
        grid-template-columns: 1fr minmax(220px, 340px);
      }
      h1 {
        margin: 0;
        font-size: clamp(42px, 8vw, 84px);
        line-height: 0.95;
        letter-spacing: 0;
      }
      p {
        color: var(--muted);
        font-size: 18px;
        line-height: 1.7;
      }
      .dog {
        image-rendering: pixelated;
        width: 100%;
        aspect-ratio: 1;
        border-radius: 24px;
        background: #09234a;
        box-shadow: 0 24px 70px rgba(24, 32, 51, 0.16);
        display: grid;
        place-items: center;
        font-size: 96px;
      }
      .links {
        display: flex;
        gap: 14px;
        flex-wrap: wrap;
        margin-top: 28px;
      }
      a {
        color: var(--ink);
        font-weight: 700;
      }
      .button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 48px;
        padding: 0 18px;
        border-radius: 8px;
        text-decoration: none;
        background: var(--sun);
      }
      .button.secondary {
        background: white;
        border: 1px solid rgba(24, 32, 51, 0.14);
      }
      footer {
        margin-top: 64px;
        color: var(--muted);
        font-size: 14px;
      }
      @media (max-width: 720px) {
        .hero {
          grid-template-columns: 1fr;
        }
        main {
          padding-top: 40px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="hero">
        <div>
          <h1>Dog Memory</h1>
          <p>Watch the pixel dogs light up, remember the order, and tap them back. A quick score-chasing memory game for iPhone.</p>
          <div class="links">
            <a class="button" href="https://apps.apple.com/app/id6771175045">App Store</a>
            <a class="button secondary" href="/privacy.html">Privacy Policy</a>
            <a class="button secondary" href="/support.html">Support</a>
          </div>
        </div>
        <div class="dog" aria-label="Dog Memory app icon">🐶</div>
      </section>
      <footer>© 2026 Dog Memory Project</footer>
    </main>
  </body>
</html>
